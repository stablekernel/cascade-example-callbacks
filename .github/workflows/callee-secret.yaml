name: callee-secret

# Callback callee for the secret-opt-in posture. The caller job (emitted into
# orchestrate.yaml) passes CALLBACK_SECRET via a `secrets:` block. This callee
# asserts the secret arrived non-empty and reports its presence, without ever
# echoing the value.

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
      sha:
        required: false
        type: string
      version:
        required: false
        type: string
      target_env:
        required: false
        type: string
    secrets:
      CALLBACK_SECRET:
        required: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Assert opted-in secret is present
        env:
          CALLBACK_SECRET: ${{ secrets.CALLBACK_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${CALLBACK_SECRET:-}" ]; then
            echo "::error::callee-secret expected CALLBACK_SECRET to be present, but it was empty"
            exit 1
          fi
          echo "callee-secret: opted-in secret present=yes (len ${#CALLBACK_SECRET})"
          {
            echo "## callee-secret"
            echo "- opted-in secret present: yes"
          } >> "$GITHUB_STEP_SUMMARY"
